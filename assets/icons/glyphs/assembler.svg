<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Assembler — Industry diamond with interlocking block marks.
    The interior uses secondary stroke detail without filling the body silhouette.
  -->
  <polygon
    points="12,3 20,12 12,21 4,12"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linejoin="miter"
  />
  <rect
    x="7.5" y="9" width="5" height="5"
    stroke="currentColor"
    fill="none"
    stroke-width="1.5"
    stroke-linejoin="miter"
  />
  <rect
    x="11.5" y="11" width="5" height="5"
    stroke="currentColor"
    fill="none"
    stroke-width="1.5"
    stroke-linejoin="miter"
  />
</svg>