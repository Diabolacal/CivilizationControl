<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Printer — Industry diamond with a centered platen mark.
    Outer body occupies the centered 20×20 zone, leaving padding for badges/halos.
  -->
  <polygon
    points="12,3 20,12 12,21 4,12"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linejoin="miter"
  />
  <path
    d="M 12 7 L 12 17"
    stroke="currentColor"
    fill="none"
    stroke-width="2"
    stroke-linecap="butt"
  />
</svg>