name: World Package Drift

on:
  workflow_dispatch:
  schedule:
    # twice weekly; enough to catch upstream package drift without noisy runs
    - cron: '0 9 * * 1,4'

permissions:
  contents: read

concurrency:
  group: world-package-drift
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run world package drift check
        run: npm run world:mvr:ci